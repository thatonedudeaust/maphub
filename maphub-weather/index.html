<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MapHub Weather</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

<style>
* {
    box-sizing: border-box;
    font-family: Inter, Arial, sans-serif;
}

body {
    margin: 0;
    background: #0b1220;
    color: white;
}

header {
    padding: 20px;
    background: linear-gradient(135deg,#1e3a8a,#2563eb);
}

header h1 {
    margin: 0;
    font-size: 32px;
}

.search {
    margin-top: 15px;
}

input {
    padding: 12px;
    border-radius: 10px;
    border: none;
    width: 220px;
    font-size: 16px;
}

button {
    padding: 12px 18px;
    border-radius: 10px;
    border:none;
    background:#38bdf8;
    cursor:pointer;
    font-weight:bold;
}

.container {
    padding:20px;
    display:grid;
    gap:20px;
}

.card {
    background:#111827;
    border-radius:18px;
    padding:20px;
    box-shadow:0 10px 30px #0005;
}

.stats {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:15px;
}

.stat {
    background:#1f2937;
    padding:15px;
    border-radius:15px;
}

.stat h3 {
    margin:0;
    font-size:14px;
    color:#94a3b8;
}

.stat p {
    font-size:25px;
    margin:8px 0 0;
}

#map {
    height:500px;
    border-radius:15px;
}

.alert {
    background:#7f1d1d;
    border-left:5px solid #ef4444;
    padding:15px;
    border-radius:10px;
    margin-bottom:10px;
}

.small {
    color:#94a3b8;
}
</style>

</head>

<body>

<header>
<h1>🌎 MapHub Weather</h1>

<div class="search">
<input id="zip" placeholder="Enter ZIP Code">
<button onclick="loadWeather()">Search</button>
</div>
</header>


<div class="container">

<div class="card">

<h2 id="location">Enter a ZIP code</h2>
<p class="small" id="updated"></p>

<div class="stats">

<div class="stat">
<h3>Temperature</h3>
<p id="temp">--</p>
</div>

<div class="stat">
<h3>Humidity</h3>
<p id="humidity">--</p>
</div>

<div class="stat">
<h3>Wind</h3>
<p id="wind">--</p>
</div>

</div>

</div>



<div class="card">

<h2>⚠️ Active Alerts</h2>

<div id="alerts">
No location loaded.
</div>

</div>



<div class="card">

<h2>🗺️ Radar</h2>

<div id="map"></div>

</div>


</div>



<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let map;
let radarLayer;


async function loadWeather(){

let zip=document.getElementById("zip").value.trim();

if(!zip)return;


let geo=await fetch(
`https://api.zippopotam.us/us/${zip}`
);

let data=await geo.json();

let lat=data.places[0].latitude;
let lon=data.places[0].longitude;

document.getElementById("location").innerHTML =
`${data.places[0]["place name"]}, ${data.places[0]["state abbreviation"]}`;



// NWS POINT

let point=await fetch(
`https://api.weather.gov/points/${lat},${lon}`
);

let pointData=await point.json();

let forecastURL=
pointData.properties.forecast;

let stationURL=
pointData.properties.observationStations;



// CURRENT OBSERVATION

let stations=await fetch(stationURL);
let stationData=await stations.json();

let station=
stationData.features[0].id;


let obs=await fetch(
`${station}/observations/latest`
);

let obsData=await obs.json();

let p=obsData.properties;


document.getElementById("temp").innerHTML =
Math.round(p.temperature.value*9/5+32)+"°F";


document.getElementById("humidity").innerHTML =
Math.round(p.relativeHumidity.value)+"%";


document.getElementById("wind").innerHTML =
Math.round(p.windSpeed.value*0.621371)+" mph";



document.getElementById("updated").innerHTML =
"Updated "+new Date().toLocaleTimeString();



// ALERTS

let alerts=await fetch(
`https://api.weather.gov/alerts/active?point=${lat},${lon}`
);

let alertData=await alerts.json();

let alertBox=document.getElementById("alerts");

alertBox.innerHTML="";


if(alertData.features.length===0){

alertBox.innerHTML="No active alerts.";

}

else{

alertData.features.forEach(a=>{

let div=document.createElement("div");

div.className="alert";

div.innerHTML=`

<b>${a.properties.event}</b>

<p>${a.properties.headline || ""}</p>

`;

alertBox.appendChild(div);

});

}



// MAP

if(!map){

map=L.map("map").setView([lat,lon],8);


L.tileLayer(
"https://tile.openstreetmap.org/{z}/{x}/{y}.png"
).addTo(map);


}

else{

map.setView([lat,lon],8);

}



// RADAR

if(radarLayer){

map.removeLayer(radarLayer);

}


let radarTime=await fetch(
"https://api.rainviewer.com/public/weather-maps.json"
);

let radarData=await radarTime.json();

let frames=
radarData.radar.past;


let latest=
frames[frames.length-1].path;


radarLayer=L.tileLayer(
`https://tilecache.rainviewer.com${latest}/256/{z}/{x}/{y}/2/1_1.png`,
{
opacity:.55
}
);


radarLayer.addTo(map);


}


</script>


</body>
</html>
