<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MapHub Weather</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

<style>

*{
box-sizing:border-box;
font-family:Inter,Arial,sans-serif;
}

body{
margin:0;
background:#070d18;
color:white;
}

header{
padding:25px;
background:linear-gradient(135deg,#2563eb,#0ea5e9);
}

h1{
margin:0;
font-size:32px;
}

.search{
margin-top:18px;
}

input{
padding:13px;
border-radius:12px;
border:none;
width:230px;
font-size:16px;
}

button{
padding:13px 20px;
border-radius:12px;
border:none;
background:white;
color:#2563eb;
font-weight:bold;
cursor:pointer;
}


.container{
padding:20px;
display:grid;
gap:20px;
}


.card{
background:#111827;
border-radius:20px;
padding:22px;
box-shadow:0 10px 35px #0005;
}


.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:15px;
}


.stat{
background:#1e293b;
border-radius:15px;
padding:18px;
}


.stat h3{
margin:0;
font-size:14px;
color:#94a3b8;
}


.stat p{
font-size:28px;
margin:10px 0 0;
}


#map{
height:520px;
border-radius:18px;
}


.alert{
padding:15px;
margin-bottom:12px;
border-radius:12px;
background:#7f1d1d;
border-left:5px solid #ef4444;
}


.small{
color:#94a3b8;
}

</style>

</head>


<body>


<header>

<h1>🌎 MapHub Weather</h1>

<div class="search">

<input id="zip" placeholder="ZIP Code">

<button onclick="loadWeather()">
Search
</button>

</div>

</header>



<div class="container">


<div class="card">

<h2 id="location">
Enter ZIP code
</h2>

<p class="small" id="updated"></p>


<div class="stats">


<div class="stat">
<h3>Condition</h3>
<p id="condition">--</p>
</div>


<div class="stat">
<h3>Temperature</h3>
<p id="temp">--</p>
</div>


<div class="stat">
<h3>Feels Like</h3>
<p id="feels">--</p>
</div>


<div class="stat">
<h3>Humidity</h3>
<p id="humidity">--</p>
</div>


<div class="stat">
<h3>Wind</h3>
<p id="wind">--</p>
</div>


<div class="stat">
<h3>Pressure</h3>
<p id="pressure">--</p>
</div>


</div>

</div>




<div class="card">

<h2>⚠️ Active Alerts</h2>

<div id="alerts">
No location loaded.
</div>

</div>





<div class="card">

<h2>🗺 Radar</h2>

<div id="map"></div>

</div>



</div>



<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>



<script>


let map;
let radar;



async function loadWeather(){


try{


let zip=document.getElementById("zip").value.trim();


let geo=await fetch(
`https://api.zippopotam.us/us/${zip}`
);


if(!geo.ok)
throw "ZIP not found";


let location=await geo.json();


let lat=location.places[0].latitude;
let lon=location.places[0].longitude;



document.getElementById("location").innerHTML=
`${location.places[0]["place name"]}, ${location.places[0]["state abbreviation"]}`;






// NWS POINT


let point=await fetch(
`https://api.weather.gov/points/${lat},${lon}`
);


let pointData=await point.json();





// OBSERVATION STATION


let stations=await fetch(
pointData.properties.observationStations
);


let stationData=await stations.json();



let station=
stationData.features.find(
s=>s.properties.name
)?.id
||
stationData.features[0].id;





let obs=await fetch(
`${station}/observations/latest`
);


let observation=await obs.json();


let p=observation.properties;



// WEATHER VALUES


function temp(value){

if(value===null||value===undefined)
return "N/A";

return Math.round(value*9/5+32)+"°F";

}


document.getElementById("temp").innerHTML=
temp(p.temperature.value);



document.getElementById("feels").innerHTML=
temp(p.apparentTemperature.value);



document.getElementById("humidity").innerHTML=
p.relativeHumidity?.value != null
?
Math.round(p.relativeHumidity.value)+"%"
:
"N/A";



document.getElementById("wind").innerHTML=
p.windSpeed?.value != null
?
Math.round(p.windSpeed.value*0.621371)+" mph"
:
"N/A";



document.getElementById("pressure").innerHTML=
p.barometricPressure?.value != null
?
Math.round(p.barometricPressure.value/100)+" mb"
:
"N/A";



document.getElementById("condition").innerHTML=
p.textDescription || "Unknown";



document.getElementById("updated").innerHTML=
"Updated "+new Date().toLocaleTimeString();






// ALERTS


let alerts=await fetch(
`https://api.weather.gov/alerts/active?point=${lat},${lon}`
);


let alertData=await alerts.json();



let box=document.getElementById("alerts");

box.innerHTML="";



if(alertData.features.length===0){

box.innerHTML="No active alerts.";

}


else{


alertData.features.forEach(a=>{


let div=document.createElement("div");


div.className="alert";


div.innerHTML=
`
<b>${a.properties.event}</b>

<p>
${a.properties.headline || ""}
</p>
`;

box.appendChild(div);


});


}






// MAP


if(!map){


map=L.map("map").setView(
[lat,lon],
8
);


L.tileLayer(
"https://tile.openstreetmap.org/{z}/{x}/{y}.png"
).addTo(map);


}

else{

map.setView([lat,lon],8);

}





// RADAR


if(radar)
map.removeLayer(radar);



let radarData=await fetch(
"https://api.rainviewer.com/public/weather-maps.json"
);


let r=await radarData.json();


let latest=
r.radar.past[
r.radar.past.length-1
];



radar=L.tileLayer(
`https://tilecache.rainviewer.com${latest.path}/256/{z}/{x}/{y}/2/1_1.png`,
{
opacity:.55
}
);


radar.addTo(map);



}


catch(err){

alert(
"Could not load weather data."
);

console.error(err);

}


}



</script>


</body>

</html>
