<!DOCTYPE html>
<html>
<head>

<title>MapHub Weather</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link 
rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"
/>

<style>

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');


* {
    box-sizing:border-box;
}


body {

    margin:0;
    font-family:Inter,Arial,sans-serif;
    overflow:hidden;
    background:#07111f;

}


#map {

    height:100vh;
    width:100%;

}



.card {

    position:absolute;
    z-index:999;

    background:rgba(15,23,42,.85);

    backdrop-filter:blur(18px);

    color:white;

    border-radius:22px;

    box-shadow:
    0 15px 40px rgba(0,0,0,.4);

}



.header {

    top:20px;
    left:20px;

    padding:18px 22px;

}



.logo {

    font-size:25px;
    font-weight:800;

}



.small {

    color:#94a3b8;
    font-size:13px;

}



.search {

    margin-top:15px;

    display:flex;
    gap:8px;

}



input {

    width:150px;

    padding:10px;

    border-radius:12px;

    border:none;

    background:#1e293b;

    color:white;

}



button {

    border:none;

    background:#2563eb;

    color:white;

    border-radius:12px;

    padding:10px 15px;

    cursor:pointer;

    font-weight:600;

}



button:hover {

    background:#1d4ed8;

}




.weather {

    top:20px;

    right:20px;

    padding:20px;

    width:240px;

    text-align:center;

}



.location {

    font-size:16px;

    color:#cbd5e1;

}



.temp {

    font-size:60px;

    font-weight:800;

}



.condition {

    font-size:18px;

}



.stats {

    margin-top:15px;

    color:#cbd5e1;

    font-size:14px;

}




.alertPanel {

    right:20px;

    bottom:90px;

    width:320px;

    max-height:400px;

    overflow:auto;

    padding:15px;

    display:none;

}



.alert {

    background:#1e293b;

    padding:14px;

    border-radius:15px;

    margin-bottom:10px;

}



.red {
    border-left:5px solid #ef4444;
}

.orange {
    border-left:5px solid #f97316;
}

.yellow {
    border-left:5px solid #eab308;
}

.blue {
    border-left:5px solid #3b82f6;
}





.layers {

    bottom:20px;

    left:50%;

    transform:translateX(-50%);

    padding:12px;

    display:flex;

    gap:10px;

}



.layerBtn {

    background:#1e293b;

    padding:12px 18px;

    border-radius:14px;

    cursor:pointer;

}



.layerBtn:hover {

    background:#334155;

}



</style>

</head>


<body>


<div id="map"></div>



<div class="card header">


<div class="logo">
🌦 MapHub Weather
</div>


<div class="small">
National Weather Service Data
</div>



<div class="search">

<input 
id="zip"
placeholder="ZIP Code">


<button onclick="searchZip()">
Search
</button>


</div>


</div>




<div class="card weather">


<div class="location" id="location">
Select location
</div>


<div class="temp">
--°
</div>


<div class="condition">
Weather Map
</div>


<div class="stats">

💨 Wind -- mph<br>

💧 Humidity --%

</div>


</div>





<div class="card alertPanel" id="alerts">


<h3>
⚠ Active Alerts
</h3>


<div id="alertList">

</div>


</div>





<div class="card layers">


<div class="layerBtn"
onclick="toggleAlerts()">

⚠ Alerts

</div>


<div class="layerBtn">

🌧 Radar

</div>


<div class="layerBtn">

🛰 Satellite

</div>


</div>





<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>


<script>


const map =
L.map("map")
.setView(
[39.8283,-98.5795],
4
);



L.tileLayer(

"https://tile.openstreetmap.org/{z}/{x}/{y}.png",

{
maxZoom:19
}

).addTo(map);



let alertLayer =
L.layerGroup();


let alertOpen=false;






async function searchZip(){


let zip =
document.getElementById("zip").value;



const zipData =
await fetch(
`https://api.zippopotam.us/us/${zip}`
)
.then(r=>r.json());



const place =
zipData.places[0];



let lat =
Number(place.latitude);

let lon =
Number(place.longitude);



map.setView(
[lat,lon],
9
);



document.getElementById("location").innerHTML =
`${place["place name"]}, ${place.state}`;



loadAlerts(lat,lon);


}




async function loadAlerts(lat,lon){


let point =
await fetch(
`https://api.weather.gov/points/${lat},${lon}`
)
.then(r=>r.json());



let zone =
point.properties.forecastZone
.split("/")
.pop();



let data =
await fetch(
`https://api.weather.gov/alerts/active?zone=${zone}`
)
.then(r=>r.json());



document.getElementById("alertList").innerHTML="";

alertLayer.clearLayers();



data.features.forEach(a=>{


let p=a.properties;


let type=p.event.toLowerCase();



let color="yellow";


if(type.includes("tornado"))
color="red";

else if(type.includes("thunderstorm"))
color="orange";

else if(type.includes("flood"))
color="blue";



let box =
document.createElement("div");

box.className =
"alert "+color;



box.innerHTML=

`
<b>${p.event}</b>
<br>
${p.areaDesc}
<br><br>
Expires:
${new Date(p.expires).toLocaleString()}
`;



document.getElementById("alertList")
.appendChild(box);



if(a.geometry){


L.geoJSON(
a.geometry,
{

style:{
color:
getColor(color),
fillOpacity:.35
}

}

)
.addTo(alertLayer);


}



});



}





function toggleAlerts(){


alertOpen=!alertOpen;


document.getElementById("alerts")
.style.display =
alertOpen?
"block":
"none";


if(alertOpen)
alertLayer.addTo(map);

else
map.removeLayer(alertLayer);


}





function getColor(c){

return {

red:"#ef4444",

orange:"#f97316",

blue:"#3b82f6",

yellow:"#eab308"

}[c];

}


</script>


</body>

</html>
