<!DOCTYPE html>
<html>
<head>
<title>MapHub Weather</title>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
html, body {
    margin: 0;
    height: 100%;
    font-family: Arial, Helvetica, sans-serif;
    background: #111;
}

#map {
    height: 100%;
    width: 100%;
}

.panel {
    position: absolute;
    top: 15px;
    left: 15px;
    z-index: 999;
    background: rgba(20,20,20,.9);
    color: white;
    padding: 15px;
    border-radius: 12px;
    width: 260px;
    box-shadow: 0 0 20px black;
}

.title {
    font-size: 22px;
    font-weight: bold;
}

.subtitle {
    color: #aaa;
    font-size: 13px;
    margin-bottom: 10px;
}

button {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #1976ff;
    color: white;
    cursor: pointer;
    margin-top: 8px;
}

button:hover {
    background:#005ddd;
}

.status {
    margin-top: 10px;
    font-size: 13px;
}
</style>

</head>

<body>

<div class="panel">

<div class="title">
🌦️ MapHub Weather
</div>

<div class="subtitle">
Live NWS Warning Map
</div>

<button onclick="locateUser()">
📍 My Location
</button>

<div class="status" id="status">
Loading NWS alerts...
</div>

</div>


<div id="map"></div>


<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView(
    [39.8283,-98.5795],
    4
);


// Base map

L.tileLayer(
'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
{
    maxZoom:19,
    attribution:'© OpenStreetMap'
}
).addTo(map);



let warnings = L.layerGroup().addTo(map);


// Load NWS alerts

async function loadAlerts(){

try {

const response =
await fetch(
"https://api.weather.gov/alerts/active"
);

const data =
await response.json();


warnings.clearLayers();


let count = 0;


data.features.forEach(alert=>{


let geometry =
alert.geometry;


if(!geometry) return;


let coords =
geometry.coordinates;


if(geometry.type==="Polygon"){

let polygon =
L.polygon(
coords[0].map(c=>[
c[1],
c[0]
]),
{
color:getColor(alert.properties.event),
fillOpacity:.35
});


polygon.bindPopup(`

<b>${alert.properties.event}</b>
<br><br>

${alert.properties.headline || ""}

<br><br>

Expires:
${new Date(alert.properties.expires).toLocaleString()}

`);

polygon.addTo(warnings);

count++;

}

});


document.getElementById("status").innerHTML =
count+
" active warnings";


}

catch(err){

document.getElementById("status").innerHTML =
"NWS data failed";

console.log(err);

}

}



function getColor(event){

event =
event.toLowerCase();


if(event.includes("tornado"))
return "red";


if(event.includes("thunderstorm"))
return "orange";


if(event.includes("flood"))
return "blue";


if(event.includes("winter") ||
event.includes("snow"))
return "cyan";


return "yellow";

}



// Locate user

function locateUser(){

map.locate({
setView:true,
maxZoom:10
});

}


map.on(
'locationfound',
function(e){

L.marker(e.latlng)
.addTo(map)
.bindPopup(
"You are here"
)
.openPopup();

}
);


map.on(
'locationerror',
function(){

alert(
"Location permission denied"
);

}
);



loadAlerts();


// refresh every 5 minutes

setInterval(
loadAlerts,
300000
);


</script>

</body>
</html>
