<!DOCTYPE html>
<html>
<head>
<title>MapHub Weather</title>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

<style>
html,body{
    margin:0;
    height:100%;
    font-family:Arial;
}

#map{
    height:100%;
}

.panel{
    position:absolute;
    z-index:999;
    top:15px;
    left:15px;

    background:#151515;
    color:white;

    padding:15px;
    border-radius:12px;

    width:270px;
}

.title{
    font-size:22px;
    font-weight:bold;
}

input{
    width:100%;
    padding:8px;
    margin-top:8px;
    border-radius:6px;
    border:none;
}

button{
    width:100%;
    margin-top:8px;
    padding:10px;

    background:#1677ff;
    color:white;

    border:none;
    border-radius:8px;

    cursor:pointer;
}

button:hover{
    background:#005ddd;
}

.status{
    margin-top:10px;
    font-size:13px;
}
</style>

</head>

<body>


<div class="panel">

<div class="title">
🌦️ MapHub Weather
</div>

<p>Enter ZIP Code</p>

<input id="zip" placeholder="Example: 08080">


<button onclick="loadZip()">
📍 Load Weather Map
</button>


<button onclick="toggleWarnings()">
🚨 Show Warnings
</button>


<div class="status" id="status">
Ready
</div>

</div>


<div id="map"></div>


<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>


<script>


const map =
L.map('map')
.setView(
[39.8283,-98.5795],
4
);



L.tileLayer(
'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(map);



let marker;

let warningLayer =
L.layerGroup();

let warningsVisible=false;



async function loadZip(){


let zip =
document.getElementById("zip").value;



if(!zip){

alert("Enter a ZIP code");

return;

}



document.getElementById("status").innerHTML =
"Finding location...";



try{


let response =
await fetch(
`https://api.zippopotam.us/us/${zip}`
);



let data =
await response.json();



let place =
data.places[0];



let lat =
parseFloat(place.latitude);


let lon =
parseFloat(place.longitude);



map.setView(
[lat,lon],
9
);



if(marker)
map.removeLayer(marker);



marker =
L.marker([lat,lon])
.addTo(map)
.bindPopup(
`
<b>${place["place name"]}</b><br>
${place.state}
`
)
.openPopup();



document.getElementById("status").innerHTML =
"Loaded "+place["place name"];



}

catch(e){

document.getElementById("status").innerHTML =
"Invalid ZIP code";

}


}




async function toggleWarnings(){


if(warningsVisible){

map.removeLayer(warningLayer);

warningLayer.clearLayers();

warningsVisible=false;


document.getElementById("status").innerHTML =
"Warnings hidden";

return;

}



document.getElementById("status").innerHTML =
"Loading NWS warnings...";


let response =
await fetch(
"https://api.weather.gov/alerts/active"
);



let data =
await response.json();



data.features.forEach(alert=>{


let geom =
alert.geometry;


if(!geom) return;



if(geom.type==="Polygon"){


let polygon =
L.polygon(

geom.coordinates[0].map(c=>[
c[1],
c[0]
]),

{

color:getColor(
alert.properties.event
),

fillOpacity:.35

}

);



polygon.bindPopup(
`
<b>${alert.properties.event}</b>
<br><br>
${alert.properties.headline || ""}
`
);



warningLayer.addLayer(polygon);


}


});



warningLayer.addTo(map);

warningsVisible=true;


document.getElementById("status").innerHTML =
data.features.length+
" active warnings";


}




function getColor(event){

event =
event.toLowerCase();



if(event.includes("tornado"))
return "red";


if(event.includes("thunderstorm"))
return "orange";


if(event.includes("flood"))
return "blue";


if(event.includes("winter"))
return "cyan";


return "yellow";

}


</script>

</body>
</html>
